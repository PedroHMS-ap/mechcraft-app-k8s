name: app-k8s-ci-cd

on:
  push:
    branches: [homolog, main]
  pull_request:
    branches: [homolog, main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run test -- --coverage --runInBand

  deploy-homolog:
    if: github.event_name != 'pull_request' && github.ref_name == 'homolog'
    needs: build-test
    runs-on: ubuntu-latest
    environment: homolog
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Define deploy variables
        run: |
          echo "NAMESPACE=mechcraft-homolog" >> $GITHUB_ENV
          echo "IMAGE_TAG=homolog-${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "CLUSTER_RESOURCE_GROUP=mechcraft-rg" >> $GITHUB_ENV
          echo "CLUSTER_NAME=mechcraft-aks" >> $GITHUB_ENV
          echo "ACR_NAME=mechcraftacr2583" >> $GITHUB_ENV
      - name: Ensure ACR and registry credentials
        shell: bash
        run: |
          if ! az acr show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" >/dev/null 2>&1; then
            az acr create \
              --resource-group "${CLUSTER_RESOURCE_GROUP}" \
              --name "${ACR_NAME}" \
              --sku Basic \
              --location centralus \
              --admin-enabled true
          fi

          az acr update \
            --resource-group "${CLUSTER_RESOURCE_GROUP}" \
            --name "${ACR_NAME}" \
            --admin-enabled true >/dev/null

          echo "ACR_LOGIN_SERVER=$(az acr show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" --query loginServer -o tsv)" >> $GITHUB_ENV
          echo "ACR_USERNAME=$(az acr credential show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" --query username -o tsv)" >> $GITHUB_ENV
          echo "ACR_PASSWORD=$(az acr credential show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" --query 'passwords[0].value' -o tsv)" >> $GITHUB_ENV
          az acr login --name "${ACR_NAME}"
      - name: Fetch AKS kubeconfig
        shell: bash
        run: |
          az aks get-credentials \
            --resource-group "${CLUSTER_RESOURCE_GROUP}" \
            --name "${CLUSTER_NAME}" \
            --file /tmp/kubeconfig \
            --overwrite-existing
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/mechcraft-api:${{ env.IMAGE_TAG }}
      - uses: azure/setup-kubectl@v4
      - name: Apply manifests
        env:
          KUBECONFIG: /tmp/kubeconfig
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EXTERNAL_SERVICE_TOKEN: ${{ secrets.EXTERNAL_SERVICE_TOKEN }}
          CPF_AUTH_HOST: ${{ secrets.CPF_AUTH_HOST }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
        run: |
          IMAGE_REF="${ACR_LOGIN_SERVER}/mechcraft-api:${IMAGE_TAG}"
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${NAMESPACE}" create secret docker-registry mechcraft-acr \
            --docker-server="${ACR_LOGIN_SERVER}" \
            --docker-username="${ACR_USERNAME}" \
            --docker-password="${ACR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${NAMESPACE}" create secret generic mechcraft-secrets \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=EXTERNAL_SERVICE_TOKEN="${EXTERNAL_SERVICE_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/configmap.yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g; s|__IMAGE__|${IMAGE_REF}|g" k8s/deployment.yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/service.yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/hpa.yaml | kubectl apply -f -
          if [ -n "${CPF_AUTH_HOST}" ]; then
            sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/gateway/traefik-gateway.yaml | kubectl apply -f -
            sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g; s|__CPF_AUTH_HOST__|${CPF_AUTH_HOST}|g" k8s/gateway/api-gateway-routing.yaml | kubectl apply -f -
          fi
          if [ -n "${NEW_RELIC_LICENSE_KEY}" ]; then
            kubectl -n "${NAMESPACE}" create secret generic newrelic-license \
              --from-literal=license_key="${NEW_RELIC_LICENSE_KEY}" \
              --dry-run=client -o yaml | kubectl apply -f -
            sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/observability/newrelic-agent.yaml | kubectl apply -f -
          fi
          kubectl -n "${NAMESPACE}" rollout status deployment/mechcraft-api --timeout=180s

  deploy-production:
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    needs: build-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Define deploy variables
        run: |
          echo "NAMESPACE=mechcraft" >> $GITHUB_ENV
          echo "IMAGE_TAG=prod-${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "CLUSTER_RESOURCE_GROUP=mechcraft-rg" >> $GITHUB_ENV
          echo "CLUSTER_NAME=mechcraft-aks" >> $GITHUB_ENV
          echo "ACR_NAME=mechcraftacr2583" >> $GITHUB_ENV
      - name: Ensure ACR and registry credentials
        shell: bash
        run: |
          if ! az acr show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" >/dev/null 2>&1; then
            az acr create \
              --resource-group "${CLUSTER_RESOURCE_GROUP}" \
              --name "${ACR_NAME}" \
              --sku Basic \
              --location centralus \
              --admin-enabled true
          fi

          az acr update \
            --resource-group "${CLUSTER_RESOURCE_GROUP}" \
            --name "${ACR_NAME}" \
            --admin-enabled true >/dev/null

          echo "ACR_LOGIN_SERVER=$(az acr show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" --query loginServer -o tsv)" >> $GITHUB_ENV
          echo "ACR_USERNAME=$(az acr credential show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" --query username -o tsv)" >> $GITHUB_ENV
          echo "ACR_PASSWORD=$(az acr credential show --resource-group "${CLUSTER_RESOURCE_GROUP}" --name "${ACR_NAME}" --query 'passwords[0].value' -o tsv)" >> $GITHUB_ENV
          az acr login --name "${ACR_NAME}"
      - name: Fetch AKS kubeconfig
        shell: bash
        run: |
          az aks get-credentials \
            --resource-group "${CLUSTER_RESOURCE_GROUP}" \
            --name "${CLUSTER_NAME}" \
            --file /tmp/kubeconfig \
            --overwrite-existing
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/mechcraft-api:${{ env.IMAGE_TAG }}
      - uses: azure/setup-kubectl@v4
      - name: Apply manifests
        env:
          KUBECONFIG: /tmp/kubeconfig
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          EXTERNAL_SERVICE_TOKEN: ${{ secrets.EXTERNAL_SERVICE_TOKEN }}
          CPF_AUTH_HOST: ${{ secrets.CPF_AUTH_HOST }}
          NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
        run: |
          IMAGE_REF="${ACR_LOGIN_SERVER}/mechcraft-api:${IMAGE_TAG}"
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${NAMESPACE}" create secret docker-registry mechcraft-acr \
            --docker-server="${ACR_LOGIN_SERVER}" \
            --docker-username="${ACR_USERNAME}" \
            --docker-password="${ACR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${NAMESPACE}" create secret generic mechcraft-secrets \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=EXTERNAL_SERVICE_TOKEN="${EXTERNAL_SERVICE_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/configmap.yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g; s|__IMAGE__|${IMAGE_REF}|g" k8s/deployment.yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/service.yaml | kubectl apply -f -
          sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/hpa.yaml | kubectl apply -f -
          if [ -n "${CPF_AUTH_HOST}" ]; then
            sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/gateway/traefik-gateway.yaml | kubectl apply -f -
            sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g; s|__CPF_AUTH_HOST__|${CPF_AUTH_HOST}|g" k8s/gateway/api-gateway-routing.yaml | kubectl apply -f -
          fi
          if [ -n "${NEW_RELIC_LICENSE_KEY}" ]; then
            kubectl -n "${NAMESPACE}" create secret generic newrelic-license \
              --from-literal=license_key="${NEW_RELIC_LICENSE_KEY}" \
              --dry-run=client -o yaml | kubectl apply -f -
            sed "s|namespace: mechcraft|namespace: ${NAMESPACE}|g" k8s/observability/newrelic-agent.yaml | kubectl apply -f -
          fi
          kubectl -n "${NAMESPACE}" rollout status deployment/mechcraft-api --timeout=180s

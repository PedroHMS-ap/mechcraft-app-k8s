apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mechcraft-api-hpa
  namespace: mechcraft
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mechcraft-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 512Mi

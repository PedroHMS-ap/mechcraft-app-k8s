apiVersion: apps/v1
kind: Deployment
metadata:
  name: mechcraft-api
  namespace: mechcraft
  labels:
    app: mechcraft-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: mechcraft-api
  template:
    metadata:
      labels:
        app: mechcraft-api
    spec:
      imagePullSecrets:
        - name: mechcraft-acr
      containers:
        - name: api
          image: __IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: mechcraft-config
            - secretRef:
                name: mechcraft-secrets
          env:
            - name: NEW_RELIC_ENABLED
              value: "true"
            - name: NEW_RELIC_APP_NAME
              value: mechcraft-api
            - name: NEW_RELIC_LOG_LEVEL
              value: info
            - name: NEW_RELIC_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-license
                  key: license_key
                  optional: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      terminationGracePeriodSeconds: 30

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mechcraft-api
  namespace: mechcraft
  labels:
    app: mechcraft-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mechcraft-api
  template:
    metadata:
      labels:
        app: mechcraft-api
    spec:
      containers:
        - name: api
          image: mechcraftacr2583.azurecr.io/mechcraft-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: mechcraft-config
            - secretRef:
                name: mechcraft-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      terminationGracePeriodSeconds: 30

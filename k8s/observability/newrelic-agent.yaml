apiVersion: v1
kind: ServiceAccount
metadata:
  name: newrelic-infra
  namespace: mechcraft
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: newrelic-infra
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces", "services", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: newrelic-infra
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: newrelic-infra
subjects:
  - kind: ServiceAccount
    name: newrelic-infra
    namespace: mechcraft
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: newrelic-infra
  namespace: mechcraft
spec:
  selector:
    matchLabels:
      app: newrelic-infra
  template:
    metadata:
      labels:
        app: newrelic-infra
    spec:
      serviceAccountName: newrelic-infra
      securityContext:
        fsGroup: 1000
      volumes:
        - name: newrelic-data
          emptyDir: {}
      containers:
        - name: newrelic-infra
          image: newrelic/infrastructure-k8s:2.4.0-unprivileged
          volumeMounts:
            - name: newrelic-data
              mountPath: /var/db/newrelic-infra
          env:
            - name: NRIA_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: newrelic-license
                  key: license_key
                  optional: true
            - name: CLUSTER_NAME
              value: mechcraft-aks
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

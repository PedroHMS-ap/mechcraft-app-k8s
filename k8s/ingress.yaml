apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mechcraft-api-ingress
  namespace: mechcraft
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: mechcraft.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mechcraft-api
                port:
                  number: 80
